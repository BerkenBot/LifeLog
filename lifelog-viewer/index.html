<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e4e4e4;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 30px;
    }

    .setup-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .setup-box input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: white;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .setup-box button {
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .setup-box button:hover {
      transform: scale(1.05);
    }

    /* Period Selector */
    .period-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .period-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .period-btn:hover {
      border-color: rgba(255, 255, 255, 0.4);
    }

    .period-btn.active {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      border-color: transparent;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
    }

    .stat-emoji {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .stat-label {
      color: #888;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* Metric-specific colors */
    .mood {
      color: #00ff88;
    }

    .energy {
      color: #FF9F0A;
    }

    .stress {
      color: #FF3B30;
    }

    .clarity {
      color: #64D2FF;
    }

    .motivation {
      color: #5E5CE6;
    }

    .fulfillment {
      color: #0A84FF;
    }



    .sleep {
      color: #5AC8FA;
    }

    .exercise {
      color: #FF2D55;
    }

    .steps {
      color: #30D158;
    }

    .heartrate {
      color: #FF453A;
    }

    .calories {
      color: #FF9F0A;
    }

    .chart-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chart-title {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .chart {
      width: 100%;
      height: 250px;
      position: relative;
    }

    .entries-list {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .entry {
      padding: 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .entry:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .entry.full {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .entry.full:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
    }

    .entry-mood {
      font-size: 2rem;
    }

    .entry-info {
      flex: 1;
    }

    .entry-date {
      font-weight: 600;
    }

    .entry-time {
      color: #888;
      font-size: 0.9rem;
    }

    .entry-metrics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .metric-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .entry-details {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }

    .entry.expanded .entry-details {
      display: block;
    }

    .entry.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .expand-icon {
      transition: transform 0.2s;
      color: #888;
    }

    .reflection-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .reflection-label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
    }

    .reflection-text {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .health-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .health-value {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .health-label {
      font-size: 0.75rem;
      color: #888;
    }

    .metric-notes {
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
    }

    .metric-note {
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #aaa;
    }

    .metric-note strong {
      color: #ccc;
    }

    .last-updated {
      color: #666;
      font-size: 0.8rem;
      margin-top: 20px;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 50px;
      color: #888;
    }

    .error {
      text-align: center;
      padding: 50px;
      color: #ff6b6b;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .empty-emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: #aaa;
    }

    canvas {
      width: 100% !important;
      height: 250px !important;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .stat-card {
        padding: 14px;
      }

      .stat-emoji {
        font-size: 1.4rem;
      }

      .stat-value {
        font-size: 1.4rem;
      }

      .entry-mood {
        font-size: 1.6rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>

<body>
  <div class="container">
    <h1>📊 LifeLog Dashboard</h1>
    <p class="subtitle">Real-time wellness tracking</p>

    <div id="dashboard" style="display: none;">
      <div class="period-selector" id="periodSelector">
        <button class="period-btn" data-days="1">Day</button>
        <button class="period-btn active" data-days="7">Week</button>
        <button class="period-btn" data-days="30">Month</button>
        <button class="period-btn" data-days="365">Year</button>
        <button class="period-btn" data-days="0">All Time</button>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="chart-container">
        <h3 class="chart-title">📈 Trends <span id="chartDate"
            style="font-size: 0.8em; color: #888; font-weight: normal; margin-left: 10px;"></span></h3>
        <canvas id="trendChart"></canvas>
      </div>

      <div class="entries-list">
        <h3 class="chart-title">📝 Recent Check-ins</h3>
        <div id="entriesList"></div>
      </div>

      <p class="last-updated" id="lastUpdated"></p>
    </div>
  </div>

  <script>
    const MOODS = [
      { emoji: '😫', label: 'Terrible', color: '#FF3B30' },
      { emoji: '😔', label: 'Bad', color: '#FF9500' },
      { emoji: '😐', label: 'Okay', color: '#FFCC00' },
      { emoji: '🙂', label: 'Good', color: '#34C759' },
      { emoji: '😄', label: 'Great', color: '#30D158' },
    ];

    const METRICS = [
      { key: 'stress', label: 'Stress', icon: '😰', color: '#FF3B30' },
      { key: 'energy', label: 'Energy', icon: '⚡', color: '#FF9F0A' },
      { key: 'clarity', label: 'Clarity', icon: '🧠', color: '#64D2FF' },
      { key: 'motivation', label: 'Motivation', icon: '🎯', color: '#5E5CE6' },
      { key: 'fulfillment', label: 'Fulfillment', icon: '✨', color: '#0A84FF' },

    ];

    let allEntries = [];
    let currentDays = 7;
    let chart = null;
    let selectedDate = new Date();
    let isDayView = false;
    let touchStartX = 0;
    let touchEndX = 0;

    // Default Gist URL - auto-loads on page open
    const DEFAULT_GIST_URL = 'https://gist.githubusercontent.com/justinberken/32e644906d9079c1601b4a04dcf7aa8e/raw/lifelog-data.json';

    // Auto-load data on page load
    loadData();

    // Period selector
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const days = parseInt(btn.dataset.days);
        if (days === 1) {
          isDayView = true;
          selectedDate = new Date();
        } else {
          isDayView = false;
          currentDays = days;
        }
        updatePeriodButtons();
        updateDashboard();
      });
    });

    function updatePeriodButtons() {
      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.classList.remove('active');
        const days = parseInt(btn.dataset.days);
        if (isDayView && days === 1) {
          btn.classList.add('active');
          btn.textContent = selectedDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        } else if (!isDayView && days === currentDays) {
          btn.classList.add('active');
          // Reset Day button text
          if (days !== 1) {
            document.querySelector('.period-btn[data-days="1"]').textContent = 'Day';
          }
        } else if (days === 1) {
          btn.textContent = 'Day';
        }
      });
    }

    // Swipe Handling
    const chartContainer = document.querySelector('.chart-container');
    chartContainer.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    chartContainer.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      if (!isDayView) return;

      const threshold = 50;
      const diff = touchEndX - touchStartX;

      if (Math.abs(diff) > threshold) {
        const direction = diff > 0 ? -1 : 1; // Right swipe = prev day (-1), Left swipe = next day (1)

        // Build new date
        const newDate = new Date(selectedDate);
        newDate.setDate(selectedDate.getDate() + direction);

        // Prevent going into future
        if (newDate > new Date()) return;

        // Animate
        const chartCanvas = document.getElementById('trendChart');
        const oldTransform = chartCanvas.style.transform;

        // Slide out
        chartCanvas.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
        chartCanvas.style.transform = `translateX(${direction * -20}px)`;
        chartCanvas.style.opacity = '0';

        setTimeout(() => {
          selectedDate = newDate;
          updatePeriodButtons();

          // Render new data (which updates chart)
          updateDashboard();

          // Slide in
          chartCanvas.style.transition = 'none';
          chartCanvas.style.transform = `translateX(${direction * 20}px)`;

          requestAnimationFrame(() => {
            chartCanvas.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
            chartCanvas.style.transform = 'translateX(0)';
            chartCanvas.style.opacity = '1';
          });
        }, 200);
      }
    }

    async function loadData() {
      const url = DEFAULT_GIST_URL;

      try {
        const response = await fetch(url + '?t=' + Date.now()); // Cache bust
        const data = await response.json();

        allEntries = data.entries || [];

        document.getElementById('dashboard').style.display = 'block';

        updateDashboard();
        document.getElementById('lastUpdated').textContent =
          'Last synced: ' + new Date(data.lastUpdated).toLocaleString();
      } catch (error) {
        alert('Failed to load data. Check the URL and try again.');
        console.error(error);
      }
    }

    function toLocalDateStr(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getFilteredEntries() {
      if (isDayView) {
        const dateStr = toLocalDateStr(selectedDate);
        return allEntries.filter(e => e.date === dateStr);
      }

      if (currentDays === 0) return allEntries; // All time

      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - currentDays);
      const cutoffStr = toLocalDateStr(cutoff);

      return allEntries.filter(e => e.date >= cutoffStr);
    }

    function getOrdinalSuffix(day) {
      if (day > 3 && day < 21) return 'th';
      switch (day % 10) {
        case 1: return "st";
        case 2: return "nd";
        case 3: return "rd";
        default: return "th";
      }
    }

    function updateDashboard() {
      const dateSpan = document.getElementById('chartDate');
      if (isDayView) {
        const weekday = selectedDate.toLocaleDateString('en-US', { weekday: 'long' });
        const month = selectedDate.toLocaleDateString('en-US', { month: 'long' });
        const day = selectedDate.getDate();
        const suffix = getOrdinalSuffix(day);
        dateSpan.textContent = `${weekday}, ${month} ${day}${suffix}`;
      } else {
        dateSpan.textContent = '';
      }

      const entries = getFilteredEntries();
      renderStats(entries);
      renderChart(entries);
      renderEntries(entries);
    }

    function renderStats(entries) {
      if (entries.length === 0) {
        document.getElementById('statsGrid').innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-emoji">📭</div>
            <div class="empty-title">No entries for this period</div>
          </div>
        `;
        return;
      }

      const avg = (key) => {
        const valid = entries.filter(e => e[key] != null);
        return valid.length ? (valid.reduce((s, e) => s + e[key], 0) / valid.length) : null;
      };

      const avgHealth = (key) => {
        const valid = entries.filter(e => e.health && e.health[key] != null && !isNaN(parseFloat(e.health[key])));
        return valid.length ? (valid.reduce((s, e) => s + parseFloat(e.health[key]), 0) / valid.length) : null;
      };

      const moodVal = avg('mood');
      const moodEmoji = moodVal ? MOODS[Math.round(moodVal) - 1]?.emoji : '—';

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-emoji">${moodEmoji}</div>
          <div class="stat-value mood">${moodVal ? moodVal.toFixed(1) : '—'}</div>
          <div class="stat-label">Avg Mood</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">⚡</div>
          <div class="stat-value energy">${avg('energy')?.toFixed(0) || '—'}%</div>
          <div class="stat-label">Energy</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">🧠</div>
          <div class="stat-value clarity">${avg('clarity')?.toFixed(0) || '—'}%</div>
          <div class="stat-label">Clarity</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">😰</div>
          <div class="stat-value stress">${avg('stress')?.toFixed(0) || '—'}%</div>
          <div class="stat-label">Stress</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">🎯</div>
          <div class="stat-value motivation">${avg('motivation')?.toFixed(0) || '—'}%</div>
          <div class="stat-label">Motivation</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">✨</div>
          <div class="stat-value fulfillment">${avg('fulfillment')?.toFixed(0) || '—'}%</div>
          <div class="stat-label">Fulfillment</div>
        </div>

        <div class="stat-card">
          <div class="stat-emoji">😴</div>
          <div class="stat-value sleep">${avgHealth('sleep')?.toFixed(1) || '—'}h</div>
          <div class="stat-label">Sleep</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">🏃</div>
          <div class="stat-value exercise">${avgHealth('exerciseMinutes')?.toFixed(0) || '—'}m</div>
          <div class="stat-label">Exercise</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">👣</div>
          <div class="stat-value steps">${avgHealth('steps')?.toLocaleString() || '—'}</div>
          <div class="stat-label">Steps</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">❤️</div>
          <div class="stat-value heartrate">${avgHealth('heartRate')?.toFixed(0) || '—'}</div>
          <div class="stat-label">Heart Rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-emoji">🔥</div>
          <div class="stat-value calories">${avgHealth('calories')?.toLocaleString() || '—'}</div>
          <div class="stat-label">Calories</div>
        </div>
      `;
    }

    function renderChart(entries) {
      if (chart) {
        chart.destroy();
      }

      if (entries.length === 0) return;

      const SLEEP_GOAL = 8;
      const EXERCISE_GOAL = 60;

      let labels, dataPoints;

      if (isDayView) {
        // Sort entries by time
        const sorted = [...entries].sort((a, b) => (a.time || '').localeCompare(b.time || ''));

        labels = sorted.map(e => {
          // Format 14:30 to 2:30 PM
          if (!e.time) return '—';
          const [h, m] = e.time.split(':');
          const date = new Date();
          date.setHours(h, m);
          return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        });

        dataPoints = sorted.map(e => {
          const health = e.health || {};
          return {
            mood: e.mood ? (e.mood / 5) * 100 : null,
            energy: e.energy,
            stress: e.stress,
            clarity: e.clarity,
            motivation: e.motivation,
            fulfillment: e.fulfillment,
            // For day view, we just show the raw values if they exist, normalized to 0-100 for graph
            sleep: health.sleep ? Math.min((parseFloat(health.sleep) / SLEEP_GOAL) * 100, 100) : null,
            exercise: health.exerciseMinutes ? Math.min((parseInt(health.exerciseMinutes) / EXERCISE_GOAL) * 100, 100) : null,
            rawSleep: health.sleep ? parseFloat(health.sleep) : null,
            rawExercise: health.exerciseMinutes ? parseInt(health.exerciseMinutes) : null
          }
        });

      } else {
        // EXISTING AGGREGATION LOGIC
        const dateGroups = {};
        entries.forEach(e => {
          if (!dateGroups[e.date]) dateGroups[e.date] = [];
          dateGroups[e.date].push(e);
        });

        const dates = Object.keys(dateGroups).sort();
        labels = dates; // Use date strings YYYY-MM-DD, logic inside Chart callback renders them prettier? No, see below.

        dataPoints = dates.map(dateStr => {
          const dayEntries = dateGroups[dateStr];
          const avg = (key) => {
            const valid = dayEntries.filter(e => e[key] != null);
            return valid.length ? valid.reduce((s, e) => s + e[key], 0) / valid.length : null;
          };
          const avgHealth = (key) => {
            const valid = dayEntries.filter(e => e.health && e.health[key] != null && !isNaN(parseFloat(e.health[key])));
            return valid.length ? valid.reduce((s, e) => s + parseFloat(e.health[key]), 0) / valid.length : null;
          };

          const sleepVal = avgHealth('sleep');
          const exerciseVal = avgHealth('exerciseMinutes');

          return {
            mood: avg('mood') ? (avg('mood') / 5) * 100 : null,
            energy: avg('energy'),
            stress: avg('stress'),
            clarity: avg('clarity'),
            motivation: avg('motivation'),
            fulfillment: avg('fulfillment'),
            sleep: sleepVal ? Math.min((sleepVal / SLEEP_GOAL) * 100, 100) : null,
            exercise: exerciseVal ? Math.min((exerciseVal / EXERCISE_GOAL) * 100, 100) : null,
            rawSleep: sleepVal,
            rawExercise: exerciseVal
          };
        });
      }

      let sleepLabel = 'Sleep';
      let exerciseLabel = 'Exercise';

      if (isDayView) {
        const totalSleep = entries.reduce((acc, e) => acc + (parseFloat(e.health?.sleep) || 0), 0);
        const totalExercise = entries.reduce((acc, e) => acc + (parseInt(e.health?.exerciseMinutes) || 0), 0);

        if (totalSleep > 0) sleepLabel = `Sleep ${parseFloat(totalSleep.toFixed(1))}h`;
        if (totalExercise > 0) exerciseLabel = `Exercise ${totalExercise}m`;
      }

      const ctx = document.getElementById('trendChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Mood',
              data: dataPoints.map(d => d.mood),
              borderColor: '#00ff88',
              backgroundColor: 'rgba(0, 255, 136, 0.1)',
              tension: 0.4,
              fill: true,
              order: 1,
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: 'Energy',
              data: dataPoints.map(d => d.energy),
              borderColor: '#FF9F0A',
              tension: 0.4,
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: sleepLabel,
              data: dataPoints.map(d => d.sleep),
              borderColor: '#5AC8FA',
              tension: 0.4,
              borderDash: [5, 5],
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: exerciseLabel,
              data: dataPoints.map(d => d.exercise),
              borderColor: '#FF2D55',
              tension: 0.4,
              borderDash: [5, 5],
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: 'Clarity',
              data: dataPoints.map(d => d.clarity),
              borderColor: '#64D2FF',
              tension: 0.4,
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: 'Stress',
              data: dataPoints.map(d => d.stress),
              borderColor: '#FF3B30',
              tension: 0.4,
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: 'Motivation',
              data: dataPoints.map(d => d.motivation),
              borderColor: '#5E5CE6',
              tension: 0.4,
              spanGaps: true,
              pointRadius: 5,
            },
            {
              label: 'Fulfillment',
              data: dataPoints.map(d => d.fulfillment),
              borderColor: '#0A84FF',
              tension: 0.4,
              spanGaps: true,
              pointRadius: 5,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#888' },
              onClick: function (e, legendItem, legend) {
                const index = legendItem.datasetIndex;
                const ci = legend.chart;
                const meta = ci.getDatasetMeta(index);
                meta.hidden = !meta.hidden;
                ci.update();
              }
            },
            tooltip: {
              callbacks: {
                label: function (context) {
                  let label = context.dataset.label || '';
                  if (label) {
                    label += ': ';
                  }
                  if (context.parsed.y !== null) {
                    label += Math.round(context.parsed.y) + '%';
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              grid: { color: 'rgba(255,255,255,0.1)' },
              ticks: { color: '#888' },
            },
            x: {
              grid: { color: 'rgba(255,255,255,0.1)' },
              ticks: { color: '#888' },
            },
          },
        },
      });
    }

    function renderEntries(entries) {
      const recent = entries.slice(0, 30);

      if (recent.length === 0) {
        document.getElementById('entriesList').innerHTML = `
          <div class="empty-state">
            <div class="empty-emoji">📭</div>
            <div class="empty-title">No check-ins yet</div>
          </div>
        `;
        return;
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        // Correct timezone issue where YYYY-MM-DD might be interpreted as UTC
        const userTimezoneOffset = d.getTimezoneOffset() * 60000;
        const adjustedDate = new Date(d.getTime() + userTimezoneOffset);
        return adjustedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }

      document.getElementById('entriesList').innerHTML = recent.map((e, i) => `
        <div class="entry ${e.type !== 'quick' ? 'full' : ''}" onclick="this.classList.toggle('expanded')" id="entry-${i}">
          <div class="entry-header">
            <div class="entry-mood">${MOODS[(e.mood || 3) - 1]?.emoji || '😐'}</div>
            <div class="entry-info">
              <div class="entry-date">${formatDate(e.date)}</div>
              <div class="entry-time">${formatTime(e.time)} ${e.type === 'quick' ? '· Quick Check-in' : '· Full Log'}</div>
              <div class="entry-metrics">
                ${METRICS.map(m =>
        e[m.key] != null
          ? `<span class="metric-badge" style="color:${m.color}">${m.icon} ${e[m.key]}%</span>`
          : ''
      ).join('')}
                ${e.health?.sleep ? `<span class="metric-badge" style="color:#5AC8FA">😴 ${e.health.sleep}h</span>` : ''}
                ${e.health?.exerciseMinutes ? `<span class="metric-badge" style="color:#FF2D55">🏃 ${e.health.exerciseMinutes}m</span>` : ''}
              </div>
            </div>
            <span class="expand-icon">▼</span>
          </div>
          
          <div class="entry-details">
            ${e.note ? `<div class="reflection-card"><div class="reflection-label">📝 Note</div><div class="reflection-text">${escapeHtml(e.note)}</div></div>` : ''}
            
            ${e.reflections?.wentWell ? `<div class="reflection-card"><div class="reflection-label">✅ What went well</div><div class="reflection-text">${escapeHtml(e.reflections.wentWell)}</div></div>` : ''}
            
            ${e.reflections?.didNotGoWell ? `<div class="reflection-card"><div class="reflection-label">⚠️ What didn't go well</div><div class="reflection-text">${escapeHtml(e.reflections.didNotGoWell)}</div></div>` : ''}
            
            ${e.reflections?.gratefulFor ? `<div class="reflection-card"><div class="reflection-label">🙏 Grateful for</div><div class="reflection-text">${escapeHtml(e.reflections.gratefulFor)}</div></div>` : ''}
            
            ${renderMetricNotes(e.metricNotes)}
            
            ${e.health && (e.health.steps || e.health.heartRate || e.health.calories) ? `
              <div class="health-grid">
                ${e.health.steps ? `<div class="health-item"><div class="health-value steps">👣 ${e.health.steps.toLocaleString()}</div><div class="health-label">Steps</div></div>` : ''}
                ${e.health.heartRate ? `<div class="health-item"><div class="health-value heartrate">❤️ ${e.health.heartRate}</div><div class="health-label">Heart Rate</div></div>` : ''}
                ${e.health.calories ? `<div class="health-item"><div class="health-value calories">🔥 ${e.health.calories.toLocaleString()}</div><div class="health-label">Calories</div></div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderMetricNotes(metricNotes) {
      if (!metricNotes) return '';
      const notes = Object.entries(metricNotes).filter(([_, v]) => v && v.trim());
      if (notes.length === 0) return '';

      // Additional note types for health data
      const HEALTH_NOTES = {
        exercise: { icon: '🏃', label: 'Exercise' },
        sleep: { icon: '😴', label: 'Sleep' }
      };

      return `
        <div class="metric-notes">
          ${notes.map(([key, value]) => {
        const metric = METRICS.find(m => m.key === key);
        const healthNote = HEALTH_NOTES[key];
        const icon = metric?.icon || healthNote?.icon || '📌';
        const label = metric?.label || healthNote?.label || key;
        return `<div class="metric-note"><strong>${icon} ${label}:</strong> ${escapeHtml(value)}</div>`;
      }).join('')}
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      // Parse YYYY-MM-DD as local date to avoid UTC shifts
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);

      const today = toLocalDateStr(new Date());
      const yesterdayDate = new Date();
      yesterdayDate.setDate(yesterdayDate.getDate() - 1);
      const yesterday = toLocalDateStr(yesterdayDate);

      if (dateStr === today) return 'Today';
      if (dateStr === yesterday) return 'Yesterday';

      // Use standard formatting but ensure it uses the local date components we parsed
      return date.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatTime(time) {
      if (!time) return '';
      const [h, m] = time.split(':');
      const hour = parseInt(h);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const hour12 = hour % 12 || 12;
      return `${hour12}:${m} ${ampm}`;
    }

    // Auto-refresh every 5 minutes
    setInterval(() => {
      if (document.getElementById('dashboard').style.display !== 'none') {
        loadData();
      }
    }, 5 * 60 * 1000);

  </script>
</body>

</html>
